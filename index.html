<!DOCTYPE html>
<html>
<head>
    <title>Checklist Application</title>
    <script>
        let checklist = [];
        let streak = 0;
        let proteinCount = 0;

        function renderChecklist() {
            const checklistElement = document.getElementById('checklist');
            checklistElement.innerHTML = '';
            checklist.forEach((task, index) => {
                const taskElement = document.createElement('div');
                taskElement.textContent = task;
                taskElement.onclick = () => toggleTask(index);
                checklistElement.appendChild(taskElement);
            });
        }

        function toggleTask(index) {
            const taskStatus = checklist[index];
            checklist[index] = taskStatus + ' (completed)';
            renderChecklist();
        }

        function renderStreak() {
            const streakElement = document.getElementById('streak');
            streakElement.textContent = `Current Streak: ${streak}`;
        }

        function renderProtein() {
            const proteinElement = document.getElementById('protein');
            proteinElement.textContent = `Protein Count: ${proteinCount}`;
        }

        function renderDashboard() {
            renderChecklist();
            renderStreak();
            renderProtein();
        }

        function addTask(task) {
            checklist.push(task);
            renderDashboard();
        }

        // Initialize with sample tasks
        document.addEventListener('DOMContentLoaded', () => {
            addTask('Complete project report');
            addTask('Prepare for presentation');
            addTask('Workout - Upper body exercises');
        });
    </script>
</head>
<body>
    <h1>My Checklist</h1>
    <div id="checklist"></div>
    <div id="streak"></div>
    <div id="protein"></div>
</body>
</html>
