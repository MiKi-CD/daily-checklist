<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Checklist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Daily Checklist Application</h1>
    </header>
    <main>
        <div id="checklist">
            <h2>Checklist</h2>
            <ul id="checklist-items"></ul>
        </div>
        <div id="streak">
            <h2>Streaks</h2>
            <p id="streak-count">0</p>
        </div>
        <div id="protein">
            <h2>Protein Tracker</h2>
            <p id="protein-count">0</p>
        </div>
        <div id="dashboard">
            <h2>Dashboard</h2>
            <p>Summary of your activities</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>

<script>
function renderChecklist() {
    // Logic to render checklist
    const checklistItems = document.getElementById('checklist-items');
    checklistItems.innerHTML = '<li>Sample Item 1</li><li>Sample Item 2</li>';
}

function renderStreak() {
    // Logic to render streak
    const streakCount = document.getElementById('streak-count');
    streakCount.textContent = '5';
}

function renderProtein() {
    // Logic to render protein tracker
    const proteinCount = document.getElementById('protein-count');
    proteinCount.textContent = '100g';
}

function renderDashboard() {
    // Logic to render dashboard
    const dashboard = document.getElementById('dashboard');
    dashboard.innerHTML += '<p>Your current progress is good.</p>';
}

document.addEventListener('DOMContentLoaded', () => {
    renderChecklist();
    renderStreak();
    renderProtein();
    renderDashboard();
});
</script>
